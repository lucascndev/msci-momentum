name: Daily Momentum snapshot

on:
  schedule:
    - cron: "0 22 * * *"  # 22:00 UTC daily (after US market close)
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

concurrency:
  group: daily-snapshot
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[site]"

      - name: Build site
        run: python scripts/build_site.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "daily snapshot $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const title = `Daily snapshot failed on ${today}`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'daily-snapshot-failure',
              per_page: 10,
            });
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `Daily snapshot workflow failed.\n\nRun: ${runUrl}\n\nLikely cause: yfinance partial fetch (see workflow logs for the eligibility-ratio error).`;
            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['daily-snapshot-failure'],
              });
            }
